{% load static %}

<div id="aesm-loader">

  <div class="ld-ambient-glow"></div>

  <div class="ld-container">
    <div class="ld-ring ld-ring-outer"></div>
    <div class="ld-ring ld-ring-inner"></div>

    <div class="ld-center">
      <img
        src="{% static 'images/favicon.png' %}"
        alt="AESM"
        class="ld-logo"
      />
      <div class="ld-halo"></div>
    </div>
  </div>

  <div class="ld-text">
    <span class="ld-title">AESM</span>
    <div class="ld-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

</div>

<style>
/* ── Variables ── */
:root {
  --ld-blue:   #1a1fa8;
  --ld-mid:    #2d35c9;
  --ld-accent: #6c6fff;
  --ld-bg:     #0a0b1a;
}

/* ── Overlay ── */
#aesm-loader {
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: var(--ld-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  overflow: hidden;

  /* Transition fluide à la disparition */
  opacity: 1;
  visibility: visible;
  transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), 
              visibility 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

#aesm-loader.ld-hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

/* ── Ambiance Glow Arrière-plan ── */
.ld-ambient-glow {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(45, 53, 201, 0.15) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(40px);
  z-index: 0;
  pointer-events: none;
}

/* ── Conteneur Global de l'Animation ── */
.ld-container {
  position: relative;
  width: 200px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

/* ── Anneaux Rotatifs Ultra-Fins ── */
.ld-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid transparent;
}

.ld-ring-outer {
  width: 190px;
  height: 190px;
  border-top-color: var(--ld-accent);
  border-right-color: rgba(108, 111, 255, 0.15);
  border-bottom-color: rgba(108, 111, 255, 0.02);
  border-left-color: rgba(108, 111, 255, 0.3);
  animation: ld-spin-cw 2.2s cubic-bezier(0.4, 0.1, 0.2, 1) infinite;
}

.ld-ring-inner {
  width: 150px;
  height: 150px;
  border-top-color: transparent;
  border-right-color: var(--ld-mid);
  border-bottom-color: rgba(45, 53, 201, 0.05);
  border-left-color: var(--ld-accent);
  opacity: 0.6;
  animation: ld-spin-ccw 1.6s cubic-bezier(0.4, 0.1, 0.2, 1) infinite;
}

@keyframes ld-spin-cw  { to { transform: rotate(360deg);  } }
@keyframes ld-spin-ccw { to { transform: rotate(-360deg); } }

/* ── Centre & Logo ── */
.ld-center {
  position: relative;
  width: 90px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ld-logo {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  z-index: 2;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 12px 40px rgba(10, 11, 26, 0.8),
              0 0 30px rgba(45, 53, 201, 0.3);
  animation: ld-breathe 3s ease-in-out infinite;
}

/* Halo interne discret */
.ld-halo {
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(108, 111, 255, 0.12) 0%, transparent 75%);
  z-index: 1;
  animation: ld-pulse 3s ease-in-out infinite;
}

@keyframes ld-breathe {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.03); box-shadow: 0 16px 50px rgba(10, 11, 26, 0.9), 0 0 45px rgba(45, 53, 201, 0.45); }
}

@keyframes ld-pulse {
  0%, 100% { opacity: 0.4; transform: scale(0.95); }
  50%      { opacity: 1;   transform: scale(1.08); }
}

/* ── Texte & Shimmer Premium ── */
.ld-text {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  z-index: 1;
}

.ld-title {
  font-family: 'Syne', 'Inter', 'Segoe UI', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  
  /* Shimmer Linéaire Ultra-Lisse */
  background: linear-gradient(
    90deg,
    rgba(255,255,255,0.3) 0%,
    rgba(255,255,255,0.9) 35%,
    #6c6fff 50%,
    rgba(255,255,255,0.9) 65%,
    rgba(255,255,255,0.3) 100%
  );
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: ld-shimmer 2.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}

@keyframes ld-shimmer {
  from { background-position: 150% center; }
  to   { background-position: -50% center; }
}

/* Dots minimalistes */
.ld-dots {
  display: flex;
  gap: 6px;
}

.ld-dots span {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--ld-accent);
  opacity: 0.3;
  animation: ld-dots-flow 1.4s ease-in-out infinite;
}

.ld-dots span:nth-child(1) { animation-delay: 0s; }
.ld-dots span:nth-child(2) { animation-delay: 0.2s; }
.ld-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes ld-dots-flow {
  0%, 100% { transform: translateY(0); opacity: 0.3; }
  50%      { transform: translateY(-4px); opacity: 1; background: #fff; }
}

/* ── Fine ligne de progression inférieure ── */
#aesm-loader::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--ld-accent), transparent);
  background-size: 200% auto;
  width: 100%;
  opacity: 0.8;
  animation: ld-progress-bar 2s linear infinite;
}

@keyframes ld-progress-bar {
  0%   { background-position: 200% center; }
  100% { background-position: -200% center; }
}
</style>

<script>
  // Préservation stricte de ta logique JavaScript initiale
  window.addEventListener('load', function () {
    const loader = document.getElementById('aesm-loader');
    if (!loader) return;
    
    const shown = Date.now();
    const minDuration = 800; // Confort visuel minimal de 800ms

    function hide() {
      loader.classList.add('ld-hidden');
      setTimeout(() => loader.remove(), 600);
    }

    const elapsed = Date.now() - shown;
    if (elapsed >= minDuration) {
      hide();
    } else {
      setTimeout(hide, minDuration - elapsed);
    }
  });
</script>
