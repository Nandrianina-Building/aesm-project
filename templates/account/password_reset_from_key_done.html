{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mot de passe changé — AESM</title>
  {% include 'includes/favicon.html' %}
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{%  static 'css/password_reset_from_key_done.css' %}">
</head>
<body>
  <div class="card">
    <div class="card-top">
      <div class="success-ring">
        <svg viewBox="0 0 80 80">
          <circle class="ring-circle" cx="40" cy="40" r="35"/>
          <polyline class="ring-check" points="22,40 34,52 58,28"/>
        </svg>
      </div>
      <h1>Mot de passe changé !</h1>
      <p>Votre mot de passe a été modifié avec succès. Vous pouvez maintenant vous connecter.</p>
    </div>
    <div class="card-body">
      <a href="{% url 'account_login' %}" class="btn-login">
        <i class="fa fa-right-to-bracket"></i> Retour à la connexion
      </a>
    </div>
  </div>
</body>
</html>
