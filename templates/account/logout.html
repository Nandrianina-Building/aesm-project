{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Déconnexion — AESM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{% static 'css/logout.css' %}">
</head>
<body>
  <div class="logout-card">
    <div class="logout-top">
      <div class="logout-icon"><i class="fa fa-right-from-bracket"></i></div>
      <h2>Déconnexion</h2>
      <p>Voulez-vous vraiment vous déconnecter de votre espace AESM ?</p>
    </div>
    <div class="logout-body">
      <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn-logout">
          <i class="fa fa-right-from-bracket"></i> Oui, me déconnecter
        </button>
      </form>
      <a href="{%  url 'dashboardAesm' %}" class="btn-cancel">
        <i class="fa fa-xmark"></i> Annuler
      </a>
    </div>
  </div>
</body>
</html>
