{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email envoyé — AESM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{% static 'css/verification_sent.css' %}">
</head>
<body>
  <div class="card">
    <div class="card-top">
      <div class="mail-icon"><i class="fa fa-envelope"></i></div>
      <h1>Vérifiez votre email</h1>
      <p>Un email de confirmation a été envoyé à votre adresse. Cliquez sur le lien dans cet email pour activer votre compte.</p>
    </div>
    <div class="card-body">
      <div class="info-box">
        <i class="fa fa-circle-info"></i>
        <p>Si vous avez déjà confirmé votre adresse e-mail, revenez à la page de connexion ci-dessous.</p>
      </div>
      <a href="{% url 'account_login' %}" class="btn-primary">
        <i class="fa fa-right-to-bracket"></i> Aller à la connexion
      </a>
    </div>
  </div>
</body>
</html>
