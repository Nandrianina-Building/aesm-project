{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% include 'includes/favicon.html' %}
  <title>Confirmation email — AESM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{% static 'css/email_confirm.css' %}">
</head>
<body>
  <div class="card">
    <div class="card-top">
      <div class="check-icon"><i class="fa fa-check"></i></div>
      <h1>Votre compte est prêt !</h1>
      <p>Votre adresse e-mail a été vérifiée avec succès. Cliquez ci-dessous pour finaliser la confirmation et accéder à votre espace membre AESM.</p>
    </div>
    <div class="card-body">
      <form action="" method="post">
        {% csrf_token %}
        <button type="submit" class="btn-confirm">
          <i class="fa fa-right-to-bracket"></i> Confirmez et se connecter
        </button>
      </form>
    </div>
  </div>
</body>
</html>
