<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% include 'includes/favicon.html' %}
  <title>Administration — AESM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-dark: #1a1fa8; --blue-mid: #2d35c9; --blue-light: #3d48e5; --accent: #6c6fff;
      --white: #ffffff; --bg: #f4f5f9; --card-bg: #ffffff;
      --text-primary: #0f1117; --text-muted: #6b7280; --text-light: #9ca3af;
      --border: #e5e7eb;
      --danger: #dc2626; --danger-bg: #fef2f2; --danger-border: #fecaca;
      --radius: 14px; --radius-sm: 8px;
      --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
      --font-head: sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      /* Subtle grid pattern */
      background-image:
        linear-gradient(rgba(45,53,201,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45,53,201,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .login-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      width: 100%; max-width: 420px;
      overflow: hidden;
      animation: cardIn 0.32s ease;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header dégradé ── */
    .card-header {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-light) 60%, var(--accent) 100%);
      padding: 36px 32px 30px;
      position: relative; overflow: hidden;
    }
    .card-header::before {
      content: ''; position: absolute; top: -50px; right: -50px;
      width: 180px; height: 180px;
      background: rgba(255,255,255,0.06); border-radius: 50%;
    }
    .card-header::after {
      content: ''; position: absolute; bottom: -30px; left: -30px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.04); border-radius: 50%;
    }

    .header-icon {
      width: 52px; height: 52px;
      background: rgba(255,255,255,0.18);
      border-radius: 14px; backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: white;
      margin-bottom: 16px; position: relative;
    }
    .card-header h1 {
      font-family: var(--font-head); font-size: 24px; font-weight: 800;
      color: white; margin-bottom: 5px; position: relative;
    }
    .card-header p {
      font-size: 13.5px; color: rgba(255,255,255,0.70); position: relative;
    }

    /* ── Body ── */
    .card-body { padding: 32px; }

    /* Error banner */
    .error-banner {
      background: var(--danger-bg); border: 1px solid var(--danger-border);
      border-radius: var(--radius-sm); padding: 12px 16px;
      margin-bottom: 22px;
      display: flex; align-items: center; gap: 10px;
      font-size: 13.5px; color: var(--danger);
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .error-banner i { flex-shrink: 0; }

    /* Form groups */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text-primary); margin-bottom: 7px;
    }
    .input-wrap { position: relative; }
    .input-wrap .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 15px; pointer-events: none;
    }
    .input-wrap .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 15px;
      background: none; border: none; cursor: pointer; padding: 0;
      transition: color 0.15s;
    }
    .input-wrap .toggle-pw:hover { color: var(--blue-mid); }

    .form-group input {
      width: 100%;
      padding: 11px 40px 11px 40px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 14px; color: var(--text-primary);
      background: var(--white); outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    /* champ sans icône droite */
    .form-group input.no-right { padding-right: 14px; }

    .form-group input:focus {
      border-color: var(--blue-mid);
      box-shadow: 0 0 0 3px rgba(45,53,201,0.10);
    }
    .form-group input::placeholder { color: var(--text-light); }

    /* Submit */
    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--blue-dark); color: var(--white);
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      margin-top: 6px;
    }
    .btn-submit:hover {
      background: var(--blue-mid); transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(29,42,200,0.28);
    }
    .btn-submit:active { transform: translateY(0); }

    /* ── Footer ── */
    .card-footer {
      padding: 16px 32px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 12.5px; color: var(--text-muted);
    }
    .card-footer i { color: var(--blue-mid); }
    .back-site {
      font-size: 12.5px; color: var(--blue-mid); font-weight: 600;
    }
    .back-site:hover { text-decoration: underline; }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .card-header { padding: 28px 24px 22px; }
      .card-body   { padding: 24px; }
      .card-footer { padding: 14px 24px 18px; }
      .card-header h1 { font-size: 21px; }
    }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- Header -->
    <div class="card-header">
      <div class="header-icon"><i class="fa fa-shield-halved"></i></div>
      <h1>Admin AESM</h1>
      <p>Accès réservé aux administrateurs</p>
    </div>

    <!-- Body -->
    <div class="card-body">

      <!-- Erreur -->
      {% if form.errors %}
      <div class="error-banner">
        <i class="fa fa-circle-exclamation"></i>
        Nom d'utilisateur ou mot de passe incorrect.
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <!-- Username -->
        <div class="form-group">
          <label>Nom d'utilisateur</label>
          <div class="input-wrap">
            <i class="fa fa-user input-icon"></i>
            <input
              type="text"
              name="username"
              class="no-right"
              placeholder="Entrez votre identifiant"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Mot de passe</label>
          <div class="input-wrap">
            <i class="fa fa-lock input-icon"></i>
            <input
              type="password"
              name="password"
              id="adminPassword"
              placeholder="Entrez votre mot de passe"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Afficher le mot de passe">
              <i class="fa fa-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="fa fa-right-to-bracket"></i> Se connecter
        </button>

      </form>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      <i class="fa fa-arrow-left"></i>
      <a href="{% url 'dashboardAesm' %}" class="back-site">Retour au site</a>
    </div>

  </div>

  <script>
    // Toggle password visibility
    const pwInput   = document.getElementById('adminPassword');
    const toggleBtn = document.getElementById('togglePw');
    const toggleIco = document.getElementById('toggleIcon');

    toggleBtn.addEventListener('click', () => {
      if (pwInput.type === 'password') {
        pwInput.type = 'text';
        toggleIco.classList.replace('fa-eye', 'fa-eye-slash');
        toggleBtn.setAttribute('aria-label', 'Masquer le mot de passe');
      } else {
        pwInput.type = 'password';
        toggleIco.classList.replace('fa-eye-slash', 'fa-eye');
        toggleBtn.setAttribute('aria-label', 'Afficher le mot de passe');
      }
    });
  </script>

</body>
</html>
